
<style>
*{box-sizing:border-box;margin:0;padding:0;}
.sec-title{font-size:11px;font-weight:500;letter-spacing:.07em;color:var(--color-text-secondary);text-transform:uppercase;margin:24px 0 10px;}
.ramp-wrap{margin-bottom:18px;}
.ramp-name{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:6px;display:flex;align-items:center;gap:8px;}
.ramp-name .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.ramp-name .tag{font-size:10px;font-weight:400;color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary);padding:1px 7px;border-radius:4px;}
.scale{display:flex;border-radius:10px;overflow:hidden;border:0.5px solid var(--color-border-tertiary);}
.sw{flex:1;padding:10px 4px 8px;cursor:pointer;transition:opacity .12s;}
.sw:hover{opacity:.85;}
.sw-num{font-size:9px;font-weight:500;letter-spacing:.03em;margin-bottom:3px;}
.sw-hex{font-size:8.5px;font-family:var(--font-mono);}
.base-badge{font-size:7.5px;margin-top:2px;opacity:.7;}
.token-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-bottom:18px;}
.token-card{border:0.5px solid var(--color-border-tertiary);border-radius:10px;overflow:hidden;cursor:pointer;}
.token-card:hover .token-swatch{opacity:.88;}
.token-swatch{height:44px;}
.token-info{padding:7px 9px;background:var(--color-background-primary);}
.token-label{font-size:11px;font-weight:500;color:var(--color-text-primary);}
.token-sub{font-size:10px;color:var(--color-text-secondary);}
.token-hex{font-size:9px;font-family:var(--font-mono);color:var(--color-text-tertiary);}
.module-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;}
.mod-card{border:0.5px solid var(--color-border-tertiary);border-radius:10px;overflow:hidden;}
.mod-header{padding:11px 13px;display:flex;align-items:center;gap:8px;}
.mod-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.mod-title{font-size:13px;font-weight:500;}
.mod-subtitle{font-size:10px;opacity:.7;}
.mod-swatches{display:flex;}
.mod-sw{flex:1;height:30px;cursor:pointer;}
.mod-sw:hover{opacity:.8;}
.preview-bar{display:flex;gap:6px;align-items:center;padding:10px 13px;background:var(--color-background-secondary);border-top:0.5px solid var(--color-border-tertiary);}
.prev-dot{width:10px;height:10px;border-radius:50%;}
.prev-label{font-size:10px;color:var(--color-text-secondary);}
.neutral-row{display:flex;border-radius:10px;overflow:hidden;border:0.5px solid var(--color-border-tertiary);margin-bottom:8px;}
.neu-sw{flex:1;height:40px;cursor:pointer;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;}
.neu-label{font-size:8px;font-family:var(--font-mono);}
.toast{background:#1E293B;color:#F1F5F9;font-size:12px;padding:7px 16px;border-radius:8px;text-align:center;margin:12px auto 0;max-width:220px;opacity:0;transition:opacity .25s;}
.toast.show{opacity:1;}
.divider{border:none;border-top:0.5px solid var(--color-border-tertiary);margin:4px 0 20px;}
</style>

<h2 class="sr-only">Professional SaaS business design system color palette for CRM, Payroll, Billing, and Inventory modules.</h2>

<div style="padding:1rem 0;" id="root"></div>
<div class="toast" id="toast">Copied!</div>

<script>
function hexToRgb(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)};}
function rgbToHex(r,g,b){return'#'+[r,g,b].map(v=>Math.round(Math.min(255,Math.max(0,v))).toString(16).padStart(2,'0')).join('');}
function mix(hex,with_,t){const c=hexToRgb(hex),m=hexToRgb(with_);return rgbToHex(c.r+(m.r-c.r)*t,c.g+(m.g-c.g)*t,c.b+(m.b-c.b)*t);}
function luma(h){const{r,g,b}=hexToRgb(h);return(0.299*r+0.587*g+0.114*b)/255;}
function tc(h){return luma(h)>0.50?'rgba(0,0,0,0.72)':'rgba(255,255,255,0.88)';}

function scale(base){
  return{
    50: mix(base,'#ffffff',0.95),
    100:mix(base,'#ffffff',0.87),
    200:mix(base,'#ffffff',0.72),
    300:mix(base,'#ffffff',0.54),
    400:mix(base,'#ffffff',0.28),
    500:base,
    600:mix(base,'#000000',0.16),
    700:mix(base,'#000000',0.32),
    800:mix(base,'#000000',0.50),
    900:mix(base,'#000000',0.68),
  };
}

function copy(hex){
  navigator.clipboard.writeText(hex);
  const t=document.getElementById('toast');
  t.textContent='Copied '+hex.toUpperCase();
  t.classList.add('show');
  clearTimeout(window._tt);
  window._tt=setTimeout(()=>t.classList.remove('show'),1600);
}

const STEPS=[50,100,200,300,400,500,600,700,800,900];

function renderScale(name, base, tag, dotColor){
  const s=scale(base);
  let html=`<div class="ramp-wrap"><div class="ramp-name"><span class="dot" style="background:${dotColor||base}"></span>${name}${tag?`<span class="tag">${tag}</span>`:''}</div><div class="scale">`;
  STEPS.forEach(n=>{
    const h=s[n], color=tc(h);
    html+=`<div class="sw" style="background:${h}" onclick="copy('${h}')" title="${h}">
      <div class="sw-num" style="color:${color}">${n}</div>
      <div class="sw-hex" style="color:${color}">${h.toUpperCase()}</div>
      ${n===500?`<div class="base-badge" style="color:${color}">BASE</div>`:''}
    </div>`;
  });
  return html+'</div></div>';
}

const modules=[
  {name:'CRM',icon:'ti-users',base:'#0284C7',use:'Contacts, deals, pipelines',stops:[50,200,500,700,900]},
  {name:'Payroll',icon:'ti-receipt',base:'#059669',use:'Salary, attendance, tax',stops:[50,200,500,700,900]},
  {name:'Billing',icon:'ti-credit-card',base:'#7C3AED',use:'Invoices, payments, plans',stops:[50,200,500,700,900]},
  {name:'Inventory',icon:'ti-box',base:'#EA580C',use:'Stock, SKU, warehouses',stops:[50,200,500,700,900]},
];

const neutrals=[
  {hex:'#F8FAFC',label:'50'},
  {hex:'#F1F5F9',label:'100'},
  {hex:'#E2E8F0',label:'200'},
  {hex:'#CBD5E1',label:'300'},
  {hex:'#94A3B8',label:'400'},
  {hex:'#64748B',label:'500'},
  {hex:'#475569',label:'600'},
  {hex:'#334155',label:'700'},
  {hex:'#1E293B',label:'800'},
  {hex:'#0F172A',label:'900'},
];

const surfaces=[
  {label:'Page bg',sub:'Default canvas',hex:'#F8FAFC'},
  {label:'Card surface',sub:'Panels, cards',hex:'#FFFFFF'},
  {label:'Sidebar',sub:'Nav, drawer',hex:'#1E293B'},
  {label:'Sidebar active',sub:'Selected nav',hex:'#0F172A'},
];

const textTokens=[
  {label:'Title',sub:'H1, H2 headings',hex:'#0F172A'},
  {label:'Body',sub:'Paragraphs, labels',hex:'#334155'},
  {label:'Muted',sub:'Captions, hints',hex:'#64748B'},
  {label:'Disabled',sub:'Inactive elements',hex:'#94A3B8'},
];

const semantics=[
  {label:'Success',sub:'Saved, active, paid',hex:'#16A34A',light:'#DCFCE7',text:'#14532D'},
  {label:'Warning',sub:'Pending, overdue',hex:'#CA8A04',light:'#FEF9C3',text:'#713F12'},
  {label:'Error',sub:'Failed, critical',hex:'#DC2626',light:'#FEE2E2',text:'#7F1D1D'},
  {label:'Info',sub:'Notifications, tips',hex:'#0284C7',light:'#E0F2FE',text:'#0C4A6E'},
];

let html='';

html+=`<div class="sec-title">Primary brand ramps</div>`;
html+=renderScale('Primary — Navy','#1E3A5F','Core brand');
html+=renderScale('Action — Royal blue','#2563EB','Buttons, links, focus');

html+=`<hr class="divider"><div class="sec-title">Module identity colors</div>`;
html+=`<div class="module-grid">`;
modules.forEach(m=>{
  const s=scale(m.base);
  html+=`<div class="mod-card">
    <div class="mod-header" style="background:${s[50]}">
      <div class="mod-icon" style="background:${s[100]}"><i class="ti ${m.icon}" style="color:${s[700]};font-size:15px" aria-hidden="true"></i></div>
      <div>
        <div class="mod-title" style="color:${s[800]}">${m.name}</div>
        <div class="mod-subtitle" style="color:${s[600]}">${m.use}</div>
      </div>
    </div>
    <div class="mod-swatches">`;
  m.stops.forEach(n=>{
    html+=`<div class="mod-sw" style="background:${s[n]};flex:1" onclick="copy('${s[n]}')" title="${n} — ${s[n]}"></div>`;
  });
  html+=`</div>
    <div class="preview-bar">
      <span class="prev-dot" style="background:${m.base}"></span>
      <span class="prev-label">Base: <b style="font-family:var(--font-mono);font-size:10px;color:var(--color-text-primary)">${m.base.toUpperCase()}</b></span>
    </div>
  </div>`;
});
html+=`</div>`;

html+=`<hr class="divider"><div class="sec-title">Semantic / status colors</div>`;
html+=`<div class="token-grid">`;
semantics.forEach(s=>{
  html+=`<div class="token-card">
    <div style="display:flex;height:50px;">
      <div style="flex:1;background:${s.light};" onclick="copy('${s.light}')" title="Light — ${s.light}"></div>
      <div style="flex:1;background:${s.hex};" onclick="copy('${s.hex}')" title="Default — ${s.hex}"></div>
      <div style="flex:1;background:${s.text};" onclick="copy('${s.text}')" title="Dark — ${s.text}"></div>
    </div>
    <div class="token-info">
      <div class="token-label">${s.label}</div>
      <div class="token-sub">${s.sub}</div>
      <div class="token-hex">${s.light} · ${s.hex} · ${s.text}</div>
    </div>
  </div>`;
});
html+=`</div>`;

html+=`<hr class="divider"><div class="sec-title">Neutral scale — Slate</div>`;
html+=`<div class="ramp-name" style="margin-bottom:6px"><span class="dot" style="background:#64748B"></span>Slate gray <span class="tag">Backgrounds, borders, text</span></div>`;
html+=`<div class="neutral-row">`;
neutrals.forEach(n=>{
  const color=tc(n.hex);
  html+=`<div class="neu-sw" style="background:${n.hex}" onclick="copy('${n.hex}')" title="${n.hex}">
    <span class="neu-label" style="color:${color}">${n.label}</span>
  </div>`;
});
html+=`</div><div style="display:flex;justify-content:space-between;padding:0 2px;margin-top:3px;margin-bottom:14px;">
  <span style="font-size:9px;color:var(--color-text-tertiary)">Lightest</span>
  <span style="font-size:9px;color:var(--color-text-tertiary)">Darkest</span>
</div>`;

html+=`<hr class="divider"><div class="sec-title">Surface tokens</div>`;
html+=`<div class="token-grid">`;
surfaces.forEach(s=>{
  html+=`<div class="token-card" onclick="copy('${s.hex}')">
    <div class="token-swatch" style="background:${s.hex};border-bottom:0.5px solid var(--color-border-tertiary);"></div>
    <div class="token-info">
      <div class="token-label">${s.label}</div>
      <div class="token-sub">${s.sub}</div>
      <div class="token-hex">${s.hex.toUpperCase()}</div>
    </div>
  </div>`;
});
html+=`</div>`;

html+=`<div class="sec-title">Text hierarchy tokens</div>`;
html+=`<div class="token-grid">`;
textTokens.forEach(t=>{
  html+=`<div class="token-card" onclick="copy('${t.hex}')">
    <div class="token-swatch" style="background:${t.hex};border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:center;">
      <span style="font-size:15px;font-weight:500;color:${luma(t.hex)>0.5?'#0F172A':'#F8FAFC'}">Aa</span>
    </div>
    <div class="token-info">
      <div class="token-label">${t.label}</div>
      <div class="token-sub">${t.sub}</div>
      <div class="token-hex">${t.hex.toUpperCase()}</div>
    </div>
  </div>`;
});
html+=`</div>`;

html+=`<div style="font-size:11px;color:var(--color-text-tertiary);padding:4px 0 8px;">Click any swatch to copy its hex code.</div>`;

document.getElementById('root').innerHTML=html;
</script>
