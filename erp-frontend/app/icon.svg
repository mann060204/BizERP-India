<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="arrowGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#0284C7" />
    </linearGradient>
    <mask id="cutout">
      <rect width="100" height="100" fill="white" />
      <!-- Cutout path for arrow outline -->
      <polygon points="12,78 45,45 35,45 65,15 65,45 55,45 22,78" fill="black" stroke="black" stroke-width="6" stroke-linejoin="round"/>
    </mask>
  </defs>
  
  <g mask="url(#cutout)">
    <!-- Base B Shape -->
    <!-- Left Stem -->
    <rect x="20" y="20" width="16" height="60" rx="2" fill="#1E3A5F" />
    
    <!-- Top Loop -->
    <path d="M20 20 H55 C72 20 80 28 80 40 C80 52 72 52 60 52 H20 Z" fill="#1E3A5F" />
    <path d="M36 34 H55 C62 34 65 37 65 40 C65 43 62 46 55 46 H36 Z" fill="#ffffff" />
    
    <!-- Bottom Loop -->
    <path d="M20 46 H65 C82 46 90 56 90 68 C90 80 82 80 65 80 H20 Z" fill="#1E3A5F" />
    <path d="M36 58 H60 C68 58 72 61 72 65 C72 69 68 72 60 72 H36 Z" fill="#ffffff" />
  </g>

  <!-- The Arrow -->
  <polygon points="15,75 45,45 35,45 60,20 60,45 50,45 20,75" fill="url(#arrowGrad)" />
